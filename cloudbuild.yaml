substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: election-navigator

steps:
  # Build the container image using Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-builds/${_SERVICE_NAME}:$COMMIT_SHA'
      - '.'

  # Push to Artifact Registry (replaces deprecated Container Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-builds/${_SERVICE_NAME}:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-builds/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '128Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--concurrency'
      - '80'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-builds/${_SERVICE_NAME}:$COMMIT_SHA'

timeout: '600s'

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
